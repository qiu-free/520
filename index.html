<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fce4ec">
<title>520 ❤ 周欣</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  min-height: 100dvh;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
  user-select: none;
  background: linear-gradient(145deg, #fce4ec 0%, #f3e5f5 30%, #e8eaf6 60%, #e0f7fa 100%);
  background-attachment: fixed;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ========== 背景装饰 ========== */
#bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-orbs {
  position: absolute;
  border-radius: 50%;
  opacity: 0.18;
  animation: orbFloat 20s ease-in-out infinite alternate;
}

.bg-orbs:nth-child(1) {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #f48fb1, transparent 70%);
  top: -12%; left: -10%;
  animation-duration: 18s;
}
.bg-orbs:nth-child(2) {
  width: 420px; height: 420px;
  background: radial-gradient(circle, #ce93d8, transparent 70%);
  bottom: -10%; right: -8%;
  animation-duration: 22s;
  animation-delay: -5s;
}
.bg-orbs:nth-child(3) {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #90caf9, transparent 70%);
  top: 25%; right: -5%;
  animation-duration: 16s;
  animation-delay: -10s;
}
.bg-orbs:nth-child(4) {
  width: 250px; height: 250px;
  background: radial-gradient(circle, #a5d6a7, transparent 70%);
  bottom: 20%; left: 2%;
  animation-duration: 24s;
  animation-delay: -3s;
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, -40px) scale(1.2); }
}

/* ========== 浮动粒子 ========== */
.float-p {
  position: absolute;
  pointer-events: none;
  border-radius: 50%;
  opacity: 0;
  animation: particleRise linear infinite;
}
@keyframes particleRise {
  0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.6; }
  92% { opacity: 0.2; }
  100% { transform: translateY(-5vh) scale(1.2) rotate(720deg); opacity: 0; }
}

.float-e {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  animation: emojiRise linear infinite;
}
@keyframes emojiRise {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.35; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-5vh) rotate(360deg); opacity: 0; }
}

/* ========== 封面 ========== */
#cover {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
  transition: opacity 1s ease, transform 1s ease;
}
#cover.hide {
  opacity: 0;
  transform: scale(1.08);
  pointer-events: none;
}

#cover .big-heart {
  font-size: clamp(56px, 14vw, 110px);
  display: inline-block;
  animation: heartBeat 1.4s ease-in-out infinite;
  filter: drop-shadow(0 0 40px rgba(244,143,177,0.4));
  line-height: 1;
}
@keyframes heartBeat {
  0%,100%{transform:scale(1)}
  14%{transform:scale(1.35)}
  28%{transform:scale(1)}
  42%{transform:scale(1.18)}
  56%{transform:scale(1)}
}

#cover .title {
  font-size: clamp(38px, 9vw, 78px);
  font-weight: 800;
  letter-spacing: 8px;
  background: linear-gradient(135deg, #f06292, #ba68c8, #64b5f6, #f06292);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 4s ease infinite;
  margin: 6px 0;
}
@keyframes gradShift {
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

#cover .sub {
  font-size: clamp(18px, 3.2vw, 30px);
  font-weight: 300;
  color: #ad1457;
  letter-spacing: 12px;
  opacity: 0.75;
}
#cover .name {
  font-size: clamp(24px, 4.2vw, 40px);
  font-weight: 600;
  color: #e91e63;
  letter-spacing: 5px;
  margin-top: 14px;
  padding: 8px 36px;
  border-radius: 40px;
  background: rgba(255,255,255,0.5);
  border: 1.5px solid rgba(233,30,99,0.12);
  box-shadow: 0 4px 24px rgba(233,30,99,0.06);
}
#cover .hint {
  position: absolute; bottom: 44px;
  font-size: 14px;
  color: rgba(173,20,87,0.3);
  letter-spacing: 4px;
  animation: hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100%{opacity:0.3}
  50%{opacity:0.7}
}

/* 全屏按钮（移动端点击用） */
.fs-btn-mobile {
  display: none;
  margin-top: 18px;
  padding: 10px 28px;
  border-radius: 40px;
  background: linear-gradient(135deg, #f06292, #ba68c8);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 2px;
  border: none;
  box-shadow: 0 4px 20px rgba(233,30,99,0.15);
  cursor: pointer;
  animation: fsPulse 2s ease-in-out infinite;
}

@keyframes fsPulse {
  0%,100%{box-shadow:0 4px 20px rgba(233,30,99,0.15); transform:scale(1)}
  50%{box-shadow:0 6px 30px rgba(233,30,99,0.3); transform:scale(1.03)}
}

/* 移动端显示全屏按钮，隐藏轻触提示 */
@media (hover: none) and (pointer: coarse) {
  #cover .hint { display: none; }
  .fs-btn-mobile { display: inline-block; }
}

@media (max-width: 768px) {
  .fs-btn-mobile { display: inline-block; }
  #cover .hint { display: none; }
}

/* ========== 3D 爱心 ========== */
#heart-3d-wrap {
  position: fixed;
  top: 50%; left: 50%;
  z-index: 2;
  width: min(48vw, 48vh);
  height: min(48vw, 48vh);
  perspective: 1400px;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

.heart-3d {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  position: relative;
  animation: heartSpin 8s linear infinite, heartPulse3d 2.4s ease-in-out infinite;
}

@keyframes heartSpin {
  0%   { transform: rotateY(0deg) rotateX(5deg); }
  25%  { transform: rotateY(90deg) rotateX(0deg); }
  50%  { transform: rotateY(180deg) rotateX(-5deg); }
  75%  { transform: rotateY(270deg) rotateX(0deg); }
  100% { transform: rotateY(360deg) rotateX(5deg); }
}

@keyframes heartPulse3d {
  0%,100%{transform:rotateY(var(--ry)) rotateX(var(--rx)) scale(1)}
  12%{transform:rotateY(var(--ry)) rotateX(var(--rx)) scale(1.08)}
  24%{transform:rotateY(var(--ry)) rotateX(var(--rx)) scale(1)}
  36%{transform:rotateY(var(--ry)) rotateX(var(--rx)) scale(1.04)}
  48%{transform:rotateY(var(--ry)) rotateX(var(--rx)) scale(1)}
}

.heart-layer {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
}

.heart-layer svg {
  width: 100%; height: 100%;
  display: block;
  overflow: visible;
}

/* 爱心辉光 */
#heart-glow {
  position: fixed;
  top: 50%; left: 50%;
  z-index: 1;
  width: min(58vw, 58vh);
  height: min(58vw, 58vh);
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, rgba(244,143,177,0.15), rgba(186,104,200,0.08), transparent 70%);
  pointer-events: none;
  animation: glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  0%{transform:translate(-50%,-50%) scale(0.9); opacity:0.5}
  100%{transform:translate(-50%,-50%) scale(1.2); opacity:1}
}

/* 光环环圈 */
#rings {
  position: fixed;
  top: 50%; left: 50%;
  z-index: 1;
  width: min(54vw, 54vh);
  height: min(54vw, 54vh);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 1px solid;
  animation: ringSpin 10s linear infinite;
  transform: translate(-50%, -50%);
}
.ring:nth-child(1) {
  width: 100%; height: 100%;
  border-color: rgba(244,143,177,0.08);
  animation-duration: 10s;
}
.ring:nth-child(2) {
  width: 82%; height: 82%;
  border-color: rgba(186,104,200,0.06);
  animation-duration: 8s;
  animation-direction: reverse;
}
.ring:nth-child(3) {
  width: 118%; height: 118%;
  border-color: rgba(144,202,249,0.05);
  animation-duration: 14s;
}
@keyframes ringSpin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ========== 祝福卡牌 ========== */
#cards {
  position: fixed; inset: 0; z-index: 5;
  pointer-events: none;
}

.card {
  position: absolute;
  transform: translate(-50%, -50%);
  padding: 8px 16px;
  border-radius: 14px;
  font-size: clamp(13px, 1.5vw, 18px);
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: left 0.8s cubic-bezier(0.22, 1, 0.36, 1), top 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  border: 1px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  pointer-events: none;
}
.card.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.card.dissolve {
  opacity: 0 !important;
  transform: translate(-50%, -50%) scale(0.2) translateY(-20px) !important;
  transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.6, 0, 0.4, 1) !important;
}

/* ========== 底部 ========== */
#footer {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  font-size: clamp(12px,1.3vw,15px);
  color: rgba(173,20,87,0.2);
  letter-spacing: 3px;
  opacity: 0;
  transition: opacity 1s ease;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  padding: 6px 22px;
  border-radius: 30px;
  white-space: nowrap;
}
#footer.show { opacity: 1; }

#replay {
  position: fixed; bottom: 78px; left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  padding: 7px 22px;
  border-radius: 24px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(233,30,99,0.1);
  color: rgba(173,20,87,0.3);
  font-size: 12px;
  letter-spacing: 1.5px;
  cursor: pointer;
  font-family: inherit;
  opacity: 0;
  transition: opacity 0.6s ease, background 0.2s;
  pointer-events: none;
}
#replay.show { opacity: 1; pointer-events: auto; }
#replay:hover { background: rgba(255,255,255,0.35); color: rgba(173,20,87,0.55); }

/* ========== 最终画面 ========== */
#final {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
}
#final.show { opacity: 1; pointer-events: auto; }

#final .fh {
  font-size: clamp(52px, 12vw, 96px);
  animation: heartBeat 1.4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(233,30,99,0.2));
  opacity: 0;
  animation: finalFadeIn 1s ease 0.1s forwards, heartBeat 1.4s ease-in-out infinite 1.1s;
}
#final .ft {
  font-size: clamp(30px, 6vw, 54px);
  font-weight: 700;
  background: linear-gradient(135deg, #e91e63, #9c27b0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  opacity: 0;
  animation: finalFadeIn 1s ease 0.4s forwards;
}
#final .fs {
  font-size: clamp(16px, 2.5vw, 24px);
  color: #6a1b9a;
  margin-top: 10px;
  letter-spacing: 8px;
  opacity: 0;
  animation: finalFadeIn 1s ease 0.7s forwards;
}
#final .fd {
  margin-top: 20px;
  font-size: clamp(13px, 1.8vw, 17px);
  color: rgba(106,27,154,0.35);
  letter-spacing: 2px;
  opacity: 0;
  animation: finalFadeIn 1s ease 1.2s forwards;
}
@keyframes finalFadeIn {
  0%{transform:translateY(24px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}

/* ========== 涟漪 ========== */
#ripple-layer {
  position: fixed; inset: 0; z-index: 8;
  pointer-events: none;
}
.ripple-el {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(233,30,99,0.12);
  animation: rippleAnim 0.9s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim {
  0%{width:0;height:0;opacity:1}
  100%{width:320px;height:320px;opacity:0}
}

/* ========== 响应式 ========== */

  .card {
    padding: 5px 10px;
    font-size: clamp(11px, 3vw, 13px);

<body>

<!-- 背景 -->
<div id="bg">
  <div class="bg-orbs"></div>
  <div class="bg-orbs"></div>
  <div class="bg-orbs"></div>
  <div class="bg-orbs"></div>
</div>

<!-- 封面 -->
<div id="cover">
  <div class="big-heart">💖</div>
  <div class="title">520 快乐</div>
  <div class="sub">给最爱的你</div>
  <div class="name">♥ 周 欣 ♥</div>
  <div class="hint">✦ 轻触全屏播放 ✦</div>
  <div id="fs-btn" class="fs-btn-mobile">⛶ 全屏播放</div>
</div>

<!-- 3D 爱心辉光 -->
<div id="heart-glow"></div>

<!-- 光环 -->
<div id="rings">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- 3D 爱心 -->
<div id="heart-3d-wrap">
  <div class="heart-3d" id="h3d">
    <!-- 由 JS 动态填充 16 层 -->
  </div>
</div>

<!-- 祝福卡牌 -->
<div id="cards"></div>

<!-- 最终画面 -->
<div id="final">
  <div class="fh">💗</div>
  <div class="ft">周欣，520 快乐</div>
  <div class="fs">永远爱你 ❤</div>
  <div class="fd">— 春风十里，不如你 —</div>
</div>

<!-- 涟漪层 -->
<div id="ripple-layer"></div>

<div id="footer">💕 春风十里，不如你 💕</div>
<button id="replay">🔄 再看一次</button>

<script>
(function(){
  'use strict';

  // ==================== 心形参数 ====================
  function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
  function hy(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

  // SVG heart path (适配 viewBox -18 -18 36 36)
  function makeHeartPath() {
    let pts = [];
    for (let i = 0; i <= 72; i++) {
      const t = (i / 72) * Math.PI * 2;
      pts.push(((hx(t)/16)*17).toFixed(3) + ',' + (((-hy(t))/17)*17).toFixed(3));
    }
    return 'M' + pts.join(' L') + ' Z';
  }

  // ==================== 3D 爱心 ====================
  (function build3DHeart() {
    const container = document.getElementById('h3d');
    const pathD = makeHeartPath();
    const layers = 16;
    const baseColors = [
      '#1a0210','#240418','#300820','#3e0c28','#4c1032','#5a143c',
      '#681846','#761c50','#84205a','#922464','#a0286e','#ae2c78',
      '#bc3082','#ca348c','#d83896','#e63ca0'
    ];
    // 渐变层在中间
    const gradLayer = Math.floor(layers / 2);

    for (let i = 0; i < layers; i++) {
      const zOffset = -8 + (i / (layers - 1)) * 16;
      const layer = document.createElement('div');
      layer.className = 'heart-layer';
      layer.style.transform = 'translateZ(' + zOffset.toFixed(1) + 'px)';

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '-18 -18 36 36');

      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', pathD);

      if (i === gradLayer) {
        // 中间层用渐变
        const defs = document.createElementNS(svgNS, 'defs');
        const grad = document.createElementNS(svgNS, 'radialGradient');
        grad.setAttribute('id', 'hg3d');
        grad.setAttribute('cx', '35%');
        grad.setAttribute('cy', '30%');
        grad.setAttribute('r', '70%');

        const stops = [
          ['0%','#fff5f7'], ['18%','#ffb3c6'], ['40%','#ff6b9d'],
          ['65%','#e8447a'], ['100%','#a01a45']
        ];
        stops.forEach(([offset, color]) => {
          const stop = document.createElementNS(svgNS, 'stop');
          stop.setAttribute('offset', offset);
          stop.setAttribute('stop-color', color);
          grad.appendChild(stop);
        });
        defs.appendChild(grad);
        svg.appendChild(defs);
        path.setAttribute('fill', 'url(#hg3d)');
      } else {
        path.setAttribute('fill', baseColors[i]);
      }

      svg.appendChild(path);
      layer.appendChild(svg);
      container.appendChild(layer);
    }
  })();

  // ==================== 祝福语句 ====================
  const messages = [
    '愿你每一天都笑靥如花',
    '你是我最美的遇见',
    '青春正好 有你更好',
    '愿你永远开心快乐',
    '春风十里不如你',
    '你的笑容是最美的风景',
    '想和你一起看遍世界',
    '你是我心里的光',
    '每一天都在想你',
    '愿时光温柔待你',
    '你值得世间所有美好',
    '有你在身边就是幸福',
    '你是我的小确幸',
    '愿所有美好都属于你',
    '我永远在你身边',
    '你是我最珍贵的宝藏',
    '愿你被世界温柔以待',
    '和你在一起就是晴天',
    '你让我的世界变明亮',
    '牵手走过每个明天',
    '你是我最美的梦',
    '愿你的笑容永远灿烂',
    '我会一直守护你',
    '每一天都比昨天更爱你',
    '余生都是你',
    '你是我心跳的理由',
    '你是我的全世界',
    '愿幸福永远陪伴你',
    '520快乐 我的宝贝',
    '周欣 我爱你 ♥'
  ];
  const N = messages.length;

  // ==================== DOM ====================
  const cover = document.getElementById('cover');
  const cardsEl = document.getElementById('cards');
  const footer = document.getElementById('footer');
  const replayBtn = document.getElementById('replay');
  const finalEl = document.getElementById('final');
  const rippleLayer = document.getElementById('ripple-layer');

  let W = window.innerWidth, H = window.innerHeight;
  let cards = [], positions = [];
  let state = 'idle';
  let dissolveTimer = null;
  let playing = false;

  // ==================== 背景粒子 ====================
  (function bgParticles() {
    const clrs = ['#f48fb1','#ce93d8','#90caf9','#a5d6a7','#fff59d','#ffab91','#f06292'];
    for (let i = 0; i < 60; i++) {
      const e = document.createElement('div');
      e.className = 'float-p';
      const s = 2 + Math.random() * 5;
      e.style.width = e.style.height = s + 'px';
      e.style.left = Math.random() * 100 + '%';
      e.style.background = clrs[i % clrs.length];
      e.style.boxShadow = '0 0 ' + (4 + Math.random() * 8) + 'px ' + e.style.background;
      e.style.animationDuration = (14 + Math.random() * 22) + 's';
      e.style.animationDelay = (Math.random() * 18) + 's';
      document.body.appendChild(e);
    }
    const ems = ['🌸','💖','✨','💕','🌷','🌺','💗','🦋','🌻'];
    for (let i = 0; i < 18; i++) {
      const e = document.createElement('div');
      e.className = 'float-e';
      e.textContent = ems[i % ems.length];
      e.style.left = Math.random() * 100 + '%';
      e.style.fontSize = (14 + Math.random() * 16) + 'px';
      e.style.animationDuration = (18 + Math.random() * 22) + 's';
      e.style.animationDelay = (Math.random() * 20) + 's';
      document.body.appendChild(e);
    }
  })();

  // ==================== 布局卡牌 ====================
  function layoutCards() {
    cardsEl.innerHTML = '';
    cards = [];
    positions = [];
    const scale = Math.min(W, H) * 0.32 / 17;

    for (let i = 0; i < N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cx = W / 2 + hx(t) * scale;
      const cy = H / 2 - hy(t) * scale;
      const margin = 10;
      const x = Math.max(margin, Math.min(W - margin, cx));
      const y = Math.max(margin, Math.min(H - margin, cy));

      const el = document.createElement('div');
      el.className = 'card c' + (i % 30);
      el.textContent = messages[i];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      cardsEl.appendChild(el);
      cards.push(el);
      positions.push({ x, y });
    }
  }

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    if (state === 'idle' || state === 'final') layoutCards();
    else layoutCards();
  });

  // ==================== 涟漪 ====================
  function ripple(x, y) {
    const e = document.createElement('div');
    e.className = 'ripple-el';
    e.style.left = (x - 160) + 'px';
    e.style.top = (y - 160) + 'px';
    rippleLayer.appendChild(e);
    setTimeout(() => e.remove(), 900);
  }

  // ==================== 卡牌入场 ====================
  function enterCards(cb) {
    state = 'entering';
    // 先把所有卡牌定位到屏幕中央（3D 爱心位置）
    cards.forEach((el, i) => {
      el.classList.remove('show', 'dissolve');
      el.style.transition = 'none';
      el.style.left = (W / 2) + 'px';
      el.style.top = (H / 2) + 'px';
      el.style.transform = 'translate(-50%, -50%) scale(0.1)';
      el.style.opacity = '0';
    });

    // 强制回流，确保初始位置生效
    void document.body.offsetHeight;

    // 卡牌依次从中心飞向心形位置
    cards.forEach((el, i) => {
      setTimeout(() => {
        const pos = positions[i];
        el.style.transition = '';
        el.style.left = pos.x + 'px';
        el.style.top = pos.y + 'px';
        el.style.transform = 'translate(-50%, -50%) scale(1)';
        el.style.opacity = '1';
        el.classList.add('show');
      }, i * 90);
    });

    const totalTime = N * 90 + 700;
    setTimeout(() => {
      footer.classList.add('show');
      replayBtn.classList.add('show');
    }, totalTime - 400);

    setTimeout(() => {
      state = 'showing';
      if (cb) cb();
    }, totalTime);
  }

  // ==================== 卡牌消散 ====================
  function dissolveCards(cb) {
    if (state !== 'showing') return;
    state = 'dissolving';
    replayBtn.classList.remove('show');

    cards.forEach((el, i) => {
      const delay = 100 + i * 40;
      setTimeout(() => {
        el.classList.remove('show');
        el.classList.add('dissolve');
      }, delay);
    });

    const totalTime = N * 40 + 2000;
    setTimeout(() => {
      state = 'final';
      finalEl.classList.add('show');
      footer.classList.remove('show');
      setTimeout(() => replayBtn.classList.add('show'), 600);
      if (cb) cb();
    }, totalTime);
  }

  // ==================== 完整流程 ====================
  function startShow() {
    if (playing) return;
    playing = true;
    finalEl.classList.remove('show');
    footer.classList.remove('show');
    replayBtn.classList.remove('show');
    layoutCards();

    enterCards(() => {
      clearTimeout(dissolveTimer);
      dissolveTimer = setTimeout(() => {
        dissolveCards(() => { playing = false; });
      }, 8000);
    });
  }

  function replay() {
    if (playing) return;
    if (dissolveTimer) clearTimeout(dissolveTimer);
    // 重置卡牌状态：移回中央，为下次入场做准备
    cards.forEach(el => {
      el.classList.remove('show', 'dissolve');
      el.style.transition = 'none';
      el.style.left = (W / 2) + 'px';
      el.style.top = (H / 2) + 'px';
      el.style.transform = 'translate(-50%, -50%) scale(0.1)';
      el.style.opacity = '0';
    });
    finalEl.classList.remove('show');
    state = 'idle';
    playing = false;
    setTimeout(startShow, 300);
  }

  // ==================== 事件绑定 ====================
  // ==================== 全屏（支持移动端）====================
  function goFullscreen() {
    const el = document.documentElement;
    // Android / 桌面
    if (el.requestFullscreen) { el.requestFullscreen(); return; }
    // iOS Safari (15+ 支持 document 全屏)
    if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); return; }
    if (el.msRequestFullscreen) { el.msRequestFullscreen(); return; }
    // iOS 降级 — 通过 CSS 让页面撑满视口
    document.body.style.height = '100dvh';
    document.getElementById('scene').style.height = '100dvh';
  }

  // 触屏统一处理函数
  function handleCoverTap(e) {
    const x = e.clientX || (e.touches && e.touches[0].clientX) || windowW / 2;
    const y = e.clientY || (e.touches && e.touches[0].clientY) || windowH / 2;
    ripple(x, y);
    goFullscreen();
    cover.classList.add('hide');
    setTimeout(() => { cover.style.display = 'none'; }, 1000);
    setTimeout(startShow, 500);
  }

  function handleReplayTap(e) {
    const x = e.clientX || (e.touches && e.touches[0].clientX) || windowW / 2;
    const y = e.clientY || (e.touches && e.touches[0].clientY) || windowH / 2;
    ripple(x, y);
    replay();
  }

  // 封面 — 同时支持 click 和 touch
  cover.addEventListener('click', handleCoverTap);
  cover.addEventListener('touchend', function(e) { e.preventDefault(); handleCoverTap(e); });

  // 全屏按钮
  const fsBtn = document.getElementById('fs-btn');
  if (fsBtn) {
    fsBtn.addEventListener('click', handleCoverTap);
    fsBtn.addEventListener('touchend', function(e) { e.preventDefault(); handleCoverTap(e); });
  }

  // 重放按钮
  replayBtn.addEventListener('click', handleReplayTap);
  replayBtn.addEventListener('touchend', function(e) { e.preventDefault(); handleReplayTap(e); });

  // 任意点击涟漪
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#cover') && !e.target.closest('#replay') && !e.target.closest('#fs-btn')) {
      if (state === 'showing' || state === 'final') {
        ripple(e.clientX, e.clientY);
      }
    }
  });

  // ==================== 键盘快捷键 ====================
  document.addEventListener('keydown', function(e) {
    const k = e.key.toUpperCase();
    if (k === 'R') replay();
    if (k === ' ') { e.preventDefault(); if (state === 'showing' || state === 'final') replay(); }
  });

  // ==================== 初始化 ====================
  layoutCards();
  cards.forEach(el => {
    el.style.transition = 'none';
    el.style.left = (W / 2) + 'px';
    el.style.top = (H / 2) + 'px';
    el.style.transform = 'translate(-50%, -50%) scale(0.1)';
    el.style.opacity = '0';
  });

  console.log('🌸 520 · 周欣 — 我爱你 ♥');
  console.log('💡 快捷键: R / Space = 重放 | F11 = 全屏');
})();
</script>
</body>
</html>
